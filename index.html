  const longest=words.reduce((m,w)=>Math.max(m,w.length),0);
  if(t.length>54 || words.length>8 || longest>22) return ' epicTitle allowWrap';
  if(t.length>36 || words.length>6 || longest>16) return ' longTitle allowWrap';
  if(t.length>22 || words.length>4 || longest>12) return ' midTitle oneLineTitle';

}

function fitTitleElement(el){

  const t=(el.dataset.titleText || el.textContent || '').trim();
  if(!t) return;
  const isMini=!!el.closest('.miniCard');
  const parent=el.parentElement || el;
  const parentRect=parent.getBoundingClientRect();
  const available=Math.max(80, parentRect.width - 8);
  const words=t.split(/\s+/).filter(Boolean);
  const permitWrap = el.classList.contains('allowWrap') || t.length>38 || words.length>6;
  el.style.removeProperty('--titleFit');
  el.classList.toggle('oneLineTitle', !permitWrap);

    const o3=ctx.createOscillator(); o3.type='sine';     o3.frequency.value=mtof(TONIC); o3.detune.value=6;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=430; lp.Q.value=0.6;
    const g=ctx.createGain(); g.gain.value=0.0001;
    o1.connect(lp); o2.connect(lp); o3.connect(lp); lp.connect(g);
    route(g, 0.95, 0.32);
    const lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.05;
    const lg=ctx.createGain(); lg.gain.value=0.05; lfo.connect(lg); lg.connect(g.gain);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.17, t+7);
    [o1,o2,o3,lfo].forEach(o=>{ o.start(t); A.drones.push(o); });
  }
  function startRumble(){
    const ctx=A.ctx, t=ctx.currentTime;
    const src=ctx.createBufferSource(); src.buffer=noiseBuf(ctx,4,true); src.loop=true;
    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=24;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=110; lp.Q.value=0.7;
    const g=ctx.createGain(); g.gain.value=0.0001;
    src.connect(hp); hp.connect(lp); lp.connect(g); route(g, 0.5, 0.22);
    const lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.035;
    const lg=ctx.createGain(); lg.gain.value=0.028; lfo.connect(lg); lg.connect(g.gain);
    const flfo=ctx.createOscillator(); flfo.type='sine'; flfo.frequency.value=0.02;
    const fg=ctx.createGain(); fg.gain.value=34; flfo.connect(fg); fg.connect(lp.frequency);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.07, t+9);
    src.start(t); lfo.start(t); flfo.start(t); A.drones.push(src,lfo,flfo);
  }

  // ---- event voices ----
  function organChord(rootMidi, offs, t, dur, vel){
    const ctx=A.ctx;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1900; lp.Q.value=0.5;
    const env=ctx.createGain(); env.gain.value=0.0001;
    const drawbars=[[1,0.5],[2,0.27],[3,0.16],[4,0.10],[6,0.05]];
    offs.forEach(off=>{ const base=mtof(rootMidi+off);
      drawbars.forEach(([r,a])=>{ const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=base*r; o.detune.value=Math.random()*5-2.5;
        const pg=ctx.createGain(); pg.gain.value=a/offs.length; o.connect(pg); pg.connect(lp); o.start(t); o.stop(t+dur+5); });
    });
    lp.connect(env);
    const trem=ctx.createOscillator(); trem.type='sine'; trem.frequency.value=5.2;
    const td=ctx.createGain(); td.gain.value=0.05; trem.connect(td); td.connect(env.gain); trem.start(t); trem.stop(t+dur+5);
    route(env, 0.7, 0.95);
    const peak=0.2*vel;
    env.gain.setValueAtTime(0.0001,t);
    env.gain.exponentialRampToValueAtTime(peak, t+2.4);
    env.gain.setValueAtTime(peak, t+Math.max(2.4,dur-0.01));
    env.gain.exponentialRampToValueAtTime(0.0001, t+dur+4.5);
  }
  function choir(rootMidi, offs, t, dur, vel){
    const ctx=A.ctx;
    const f1=ctx.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=720; f1.Q.value=6;
    const f2=ctx.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=1150; f2.Q.value=8;
    const mix=ctx.createGain(); mix.gain.value=0.5;
    const env=ctx.createGain(); env.gain.value=0.0001;
    offs.forEach(off=>{ const base=mtof(rootMidi+off+12);
      [-9,-4,0,5,10].forEach(c=>{ const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=base; o.detune.value=c;
        const og=ctx.createGain(); og.gain.value=0.11/offs.length; o.connect(og); og.connect(f1); og.connect(f2); o.start(t); o.stop(t+dur+5); });
    });
    f1.connect(mix); f2.connect(mix); mix.connect(env);
    const sweep=ctx.createOscillator(); sweep.type='sine'; sweep.frequency.value=0.08;
    const sg=ctx.createGain(); sg.gain.value=120; sweep.connect(sg); sg.connect(f1.frequency); sweep.start(t); sweep.stop(t+dur+5);
    route(env, 0.36, 1.0);
    const peak=0.12*vel;
    env.gain.setValueAtTime(0.0001,t);
    env.gain.exponentialRampToValueAtTime(peak, t+3.2);
    env.gain.setValueAtTime(peak, t+Math.max(3.2,dur-0.01));
    env.gain.exponentialRampToValueAtTime(0.0001, t+dur+5);
  }
  function bell(midi, t, vel){
    const ctx=A.ctx, base=mtof(midi);
    const out=ctx.createGain(); out.gain.value=1;
    [[0.5,0.6,6],[1.0,1.0,5],[1.183,0.5,4],[1.506,0.34,3.4],[2.0,0.4,3],[2.51,0.2,2.4],[2.66,0.16,2],[3.0,0.12,1.6],[4.0,0.08,1.2]]
      .forEach(([r,a,dec])=>{ const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=base*r; o.detune.value=Math.random()*4-2;
        const g=ctx.createGain(); g.gain.value=0.0001; o.connect(g); g.connect(out);
        const peak=a*0.17*vel; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+0.004); g.gain.exponentialRampToValueAtTime(0.0001,t+dec);
        o.start(t); o.stop(t+dec+0.1); });
    const nz=ctx.createBufferSource(); nz.buffer=A.noise || (A.noise=noiseBuf(ctx,0.25,false));
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=base*4; bp.Q.value=2;
    const ng=ctx.createGain(); ng.gain.value=0.0001; nz.connect(bp); bp.connect(ng); ng.connect(out);
    ng.gain.setValueAtTime(0.06*vel,t); ng.gain.exponentialRampToValueAtTime(0.0001,t+0.12); nz.start(t); nz.stop(t+0.25);
    route(out, 0.55, 1.1);
  }
  function shimmer(rootMidi, t, dur){
    const ctx=A.ctx;
    const env=ctx.createGain(); env.gain.value=0.0001;
    [24,31,36].forEach((o,i)=>{ const osc=ctx.createOscillator(); osc.type='sine'; osc.frequency.value=mtof(rootMidi+o); osc.detune.value=i*7-7;
      const g=ctx.createGain(); g.gain.value=0.4/3; osc.connect(g); g.connect(env); osc.start(t); osc.stop(t+dur+4); });
    let outNode=env;
    if(ctx.createStereoPanner){ const pan=ctx.createStereoPanner(); env.connect(pan); outNode=pan;
      const plfo=ctx.createOscillator(); plfo.type='sine'; plfo.frequency.value=0.07; const pg=ctx.createGain(); pg.gain.value=0.8; plfo.connect(pg); pg.connect(pan.pan); plfo.start(t); plfo.stop(t+dur+4); }
    route(outNode, 0.2, 1.0);
    const peak=0.05;
    env.gain.setValueAtTime(0.0001,t);
    env.gain.exponentialRampToValueAtTime(peak, t+3);
    env.gain.setValueAtTime(peak, t+Math.max(3,dur-0.01));
    env.gain.exponentialRampToValueAtTime(0.0001, t+dur+4);
  }

  // ---- scheduler ----
  function scheduleStep(stepIdx, t){
    const inPhrase = stepIdx % PHRASE;
    const phraseNo = Math.floor(stepIdx / PHRASE);
    let acc=0, sec=SECTIONS[0], phaseInSec=0; const pmod = phraseNo % TOTAL_PH;
    for(const s of SECTIONS){ if(pmod < acc+s.ph){ sec=s; phaseInSec=pmod-acc; break; } acc+=s.ph; }
    const chord = PROG[phraseNo % PROG.length];
    const rootMidi = TONIC + chord.root;
    const phraseDur = PHRASE*STEP;
    if(inPhrase===0){
      if(sec.organ>0) organChord(rootMidi, chord.notes, t, phraseDur, sec.organ);
      if(sec.choir>0){ choir(rootMidi, chord.notes.slice(0,3), t, phraseDur, sec.choir); shimmer(rootMidi, t, phraseDur); }
      else if(Math.random()<0.5) shimmer(rootMidi, t, phraseDur);
      if(sec.bell==='phrase') bell(TONIC+12+chord.bell, t, 0.9);
      if(phaseInSec===0 && Math.random()<0.7) bell(TONIC, t, 0.7);
    }
    if(sec.bell==='chroma' && inPhrase%2===0){
      const ci = (phaseInSec*2 + inPhrase/2) % CHROMA.length;
      bell(TONIC + CHROMA[ci], t, 0.8);
    }
  }
  function tick(){
    if(!A) return;
    while(A.next < A.ctx.currentTime + AHEAD){ scheduleStep(A.step, A.next); A.step++; A.next += STEP; }
  }

  // ---- public API ----
  function start(){
    if(!A){ A = build(); }
    if(A.ctx.state==='suspended') A.ctx.resume();
    if(!on){
      on = true;
      A.step=0; A.next=A.ctx.currentTime+0.25;
      startPedal(); startRumble();
      tick(); A.timer=setInterval(tick, LOOK*1000);
      A.master.gain.cancelScheduledValues(A.ctx.currentTime);
      A.master.gain.setValueAtTime(0.0001, A.ctx.currentTime);
      A.master.gain.setTargetAtTime(Math.max(baseVol,0.0001), A.ctx.currentTime, 0.9);
    }
    return on;
  }
  function stop(){
    if(!A){ on=false; return on; }
    on=false;
    const dead=A; A=null;
    try{ clearInterval(dead.timer); }catch(e){}
    const t=dead.ctx.currentTime;
    try{ dead.master.gain.cancelScheduledValues(t); dead.master.gain.setTargetAtTime(0.0001, t, 0.5); }catch(e){}
    const killAt=t+2.2;
    dead.drones.forEach(o=>{ try{ o.stop(killAt); }catch(e){} });
    setTimeout(()=>{ try{ dead.ctx.close(); }catch(e){} }, 2600);
    return on;
  }
  function toggle(){ return on ? stop() : start(); }
  function duck(d){ if(!A) return; const t=A.ctx.currentTime; A.duck.gain.cancelScheduledValues(t); A.duck.gain.setTargetAtTime(d?0.34:1.0, t, d?0.2:0.6); }
  function setVolume(v){ baseVol=Math.max(0,Math.min(1,Number(v)||0)); if(A && on){ A.master.gain.setTargetAtTime(Math.max(baseVol,0.0001), A.ctx.currentTime, 0.25); } }
  function isOn(){ return on; }

  return { start, stop, toggle, duck, setVolume, isOn };
})();

function boot(){ if(!poems.length){ toast('Book data missing'); return; } initShader(); bind(); loadVoices(); if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=loadVoices; if(els.vol){ const sv=store.getItem('wbg5.vol'); if(sv!=null) els.vol.value=sv; try{WBG_MUSIC.setVolume(Number(els.vol.value));}catch(e){} } if(store.getItem('wbg5.music')==='on'){ const armMusic=()=>{ try{ if(!WBG_MUSIC.isOn()){ WBG_MUSIC.start(); setPressed(els.scoreBtn,true); } }catch(e){} window.removeEventListener('pointerdown',armMusic,true); window.removeEventListener('keydown',armMusic,true); }; window.addEventListener('pointerdown',armMusic,true); window.addEventListener('keydown',armMusic,true); } window.addEventListener('resize',()=>fitTitles(document),{passive:true}); const idx=poems.findIndex(p=>p.id===location.hash.replace('#','')); if(idx>=0) state.i=idx; render(); syncControls(); fitTitles(document); }
boot();
})();
</script>
