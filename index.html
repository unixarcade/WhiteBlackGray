/* ============================================================
   V10: DECO INTENSIFIED — MONOCHROME BOOK, GOLD CLOSING FOLIOS
   The entire codex returns to White / Black / Grey. The Art Deco
   frame is rebuilt far richer — a fountain crest, stepped sunburst
   corners, fluted pilasters, and a geometric rosette — drawn in
   silver. Gold is reserved for exactly two folios: "Working Girls"
   and the closing "Thanks." Nothing else carries gold.
   ============================================================ */
:root{
  --gold:#c9a84c; --gold-bright:#ecd592; --gold-pale:#f4e9c8; --gold-deep:#7d6224;
  --gold-line:rgba(201,168,76,.58); --gold-soft:rgba(201,168,76,.16); --gold-glow:rgba(201,168,76,.30);
}

/* — fail-safe verse reveal: lines REST visible and animate FROM hidden, so
   the poetry can never be stranded invisible if the reveal is throttled,
   interrupted by navigation, or unsupported. — */
.poemText .line{opacity:1; animation:lineIn .72s cubic-bezier(.2,.88,.14,1) both; animation-delay:calc(var(--i)*21ms)}
@keyframes lineIn{from{opacity:0; transform:translateY(10px); filter:blur(7px)} to{opacity:1; transform:none; filter:blur(0)}}

/* — an illuminated drop-cap opens every poem, silver by default — */
.poemText .line:first-child::first-letter{
  font-size:2.45em; line-height:.64; font-style:italic; margin-right:.05em; padding-right:.01em;
  background:linear-gradient(150deg,#fff 0%,#ece9e1 44%,#9a9a93 122%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
  text-shadow:0 0 18px rgba(255,255,255,.14)}

/* — refined typography on the verse plate — */
.poemText{font-feature-settings:"liga" 1,"kern" 1,"onum" 1,"calt" 1;
  -webkit-font-feature-settings:"liga" 1,"kern" 1,"onum" 1; font-kerning:normal}

<script id="bookData" type="application/json">[{"n":1,"id":"p001-white-black-grey","title":"White Black Grey","originalTitle":"White Black Grey","text":"White\nBlack\nGrey","original":"White\nBlack\nGrey","pages":[1],"words":3,"originalWords":3,"mood":"black weather / honest descent","say":"White Black Grey. White Black Grey"},{"n":2,"id":"p002-symbolmancer","title":"Symbolmancer","originalTitle":"Symbolmancer","text":"Symbolmancer: Matthew Kowalski\n\n© 1999–2005 by Matthew Kowalski\nSupport: $unixarcade","original":"Symbolmancer: Matthew Kowalski\n\n© 1999-2005 by Matthew Kowalski\nSupport: $unixarcade","pages":[2],"words":10,"originalWords":9,"mood":"grey field / open nerve","say":"Symbolmancer. Symbolmancer: Matthew Kowalski copyright 1999–2005 by Matthew Kowalski Support: cash app unix arcade"},{"n":3,"id":"p003-lightness","title":"Lightness","originalTitle":"Lightness","text":"Sun shines darkness wash away with rolling shores. Smooth happiness sunshine makes up lemonade loveliness. Take it down in a sultry slake of thirst that was. Umm it fills my belly with wholeness. I\nam now a full person. Love lets out the light necessary to persevere. All the sadness is discontinued as the ray passes. There in that\nray was soul I became that light.","original":"Sun shines darkness wash away with rolling shores. Smooth happi-\nness sunshine makes up lemonade loveliness. Take it down in a sul-\ntry slake of thirst that was. Umm it fills my belly with wholeness. I\nam now a full person. Love lets out the light necessary to perse-\nvere. All the sadness is discontinued as the ray passes. There in that\nray was soul I became that light.","pages":[3],"words":66,"originalWords":69,"mood":"white flame / tender truth","say":"Lightness. Sun shines darkness wash away with rolling shores. Smooth happiness sunshine makes up lemonade loveliness. Take it down in a sultry slake of thirst that was. Umm it fills my belly with wholeness. I am now a full person. Love lets out the light necessary to persevere. All the sadness is discontinued as the ray passes. There in that ray was soul I became that light."},{"n":4,"id":"p004-majesty","title":"Majesty","originalTitle":"Majesty","text":"Watched by the dizzying crowd. Hyped up on euphoria dancing in\necstasy. Fervent followers gawking gaudily. Worshiping religion.\nMajesty the presence of kings and jesters. Stopping is only a myth\nin the motor City. Crowds Whirl twirl swirl spin. Sounds beating,\nyour heart thumping. Arms spread to cross.\nMajesty.","original":"Watched by the dizzying crowd. Hyped up on euphoria dancing in\necstasy. Feverant Followers gawking gaudily. Worshiping religion.\nMajesty the presence of kings and jesters. Stopping is only a myth\nin the motor City. Crowds Whirl twirl swirl spin. Sounds beating,\nyour heart thumping. Arms spread to cross.\nMajesty.","pages":[3],"words":49,"originalWords":49,"mood":"white flame / tender truth","say":"Majesty. Watched by the dizzying crowd. Hyped up on euphoria dancing in ecstasy. Fervent followers gawking gaudily. Worshiping religion. Majesty the presence of kings and jesters. Stopping is only a myth in the motor City. Crowds Whirl twirl swirl spin. Sounds beating, your heart thumping. Arms spread to cross. Majesty."},{"n":5,"id":"p005-backs-to-the-wind","title":"Backs to the Wind","originalTitle":"Backs to the Wind","text":"We defied all that was told to us. We had our backs to them, and\nour backs were to the wind. All our problems fade away when were\ntogether.\nThe bonds we have created will last forever. These are the bonds of\nblood sweat, and tears. These bonds are hard to come by they are\nalso hard to break.\nThings will change we will too.\nI’ll be here if you’ll be there for me. Let us leave here as friends\nnothing less don’t forget, because I will not. Do not ever think that\nI will. With our backs to the wind we can be strong. Let yourself\nmove with the wind or you shall snap.\nThis will happen with a single storm. If this happens you will forever be lost with those exotic winds.\nYou used to be a sapling but now we are growing.\nWhat will become of us? We shall know in due time.\nSo will the wind that we defy.\nWe will defy them like we always said we would.\nLet us break all the rulz. So we can break from the oppression of\nthem.\nDon’t let them steal our dreams like they have from so many before\nus.\nWe are strong we can do all this and more. Just don’t worry about this.\nLet us learn and be taught, by all those close, and forgotten.\nDo not forget me and them.","original":"We defied all that was told to us. We had our backs to them, and\nour backs were to the wind. All our problems fade away when were\ntogether.\nThe bonds we have created will last forever. These are the bonds of\nblood sweat, and tears. These bonds are hard to come by they are\nalso hard to break.\nThings will change we will to.\nI’ll be here if you’ll be there for me. Let us leave here as friends\nnothing less don’t forget, because I will not. Do not ever think that\nI will. With our backs to the wind we can be strong. Let yourself\nmove with the wind or you shall snap.\nThis will happen with a single storm. If this happens you will for-\never be lost with those exotic winds.\nYou used to be a sapling but now we are growing.\nWhat will become of us? We shall know in due time.\nSo will the wind that we defy.\nWe will defy them like we all ways said we would.\nLet us break all the rulz.  So we can break from the oppression of\nthem.\nDon’t let them steal our dreams like they have from so many before\nus.\nWe are strong we can do all this and more. Just don’t worry about\nthis.\nLet us learn and be taught, by all those close, and forgotten.\nDo not forget me and them.","pages":[4],"words":235,"originalWords":237,"mood":"white flame / tender truth","say":"Backs to the Wind. We defied all that was told to us. We had our backs to them, and our backs were to the wind. All our problems fade away when were together. The bonds we have created will last forever. These are the bonds of blood sweat, and tears. These bonds are hard to come by they are also hard to break. Things will change we will too. I’ll be here if you’ll be there for me. Let us leave here as friends nothing less don’t forget, because I will not. Do not ever think that I will. With our backs to the wind we can be strong. Let yourself move with the wind or you shall snap. This will happen with a single storm. If this happens you will forever be lost with those exotic winds. You used to be a sapling but now we are growing. What will become of us? We shall know in due time. So will the wind that we defy. We will defy them like we always said we would. Let us break all the rulz. So we can break from the oppression of them. Don’t let them steal our dreams like they have from so many before us. We are strong we can do all this and more. Just don’t worry about this. Let us learn and be taught, by all those close, and forgotten. Do not forget me and them."},{"n":6,"id":"p006-exposition-of-sharing","title":"Exposition of Sharing","originalTitle":"Exposition of sharing","text":"Here I bring to you sweet words of vapid nature to the ears of man.\nMy intent here is good to bring health, and wisdom. For I want my\nknowledge to be used. Insyncht quiet flows through my energy.\nExplosion of power through equilibrium. I know not thon mind. My\nmind capturing pictures most exotic. Defamatory word screamed\ntowards me I do not hear.\nMy just path will not be scathed. Furrowed brow’s look upon there\nscorn will not wreak wrath. The waters will calm.","original":"Here I bring to you sweet words of vapid nature to the ears of man.\nMy intent here is good to bring health, and wisdom. For I want my\nknowledge to be used. Insyncht quiet flows through my energy.\nExplosion of power through equilibrium. I know not thon mind. My\nmind capturing pictures most exotic. Defamatory word screamed\ntowards me I do not hear.\nMy just path will not be scathed. Furrowed brow’s look upon there\nscorn will not wreak wrath. The waters will calm.","pages":[5],"words":85,"originalWords":85,"mood":"grey wound / violent honesty","say":"Exposition of Sharing. Here I bring to you sweet words of vapid nature to the ears of man. My intent here is good to bring health, and wisdom. For I want my knowledge to be used. Insyncht quiet flows through my energy. Explosion of power through equilibrium. I know not thon mind. My mind capturing pictures most exotic. Defamatory word screamed towards me I do not hear. My just path will not be scathed. Furrowed brow’s look upon there scorn will not wreak wrath. The waters will calm."},{"n":7,"id":"p007-love-s-salve","title":"Love’s Salve","originalTitle":"Loves Salve","text":"Before I saw her I knew she was the one.\nI had kissed those lips before.\nI have never touched her flesh.\nYet I knew her soft caress.\nAnd to this dying day I didn’t want to throw it all away.\nHer silent purr I envisioned as we held one another.\nI knew my soft words could win away the stone of one who was\nflesh.\nI have seen the roses open its bud to show its dress of petals.\nThe strong scent and feeling of love that I yearn for I wish to know\nits sweet taste again.\nI wish to know you the repairer of what is broken.\nWe will become as one wed cord.\nA part of the whole.\nI knew that one day the sun would dry up all the rain.\nAs the rain was my tears, and the tears tore as silent razor blades.\nRipping at my fleshy self-tearing me away where was I to go.\nTheir is nowhere to hide from ones self.\nEven in self-mutilation and malediction the cure is only temporary.\nWhat you have done to yourself may never heal without the proper\ncure.\nThe essence of love is its ability to heal.\nTo drown the sorrows of the lovelorn heart.\nTo be the sun to the rain.\nTo wash away the pain.\nI know this my love.","original":"Before I saw her I knew she was the one.\nI had kissed those lips before.\nI have never touched her flesh.\nYet I knew her soft caress.\nAnd to this dying day I didn’t want to throw it all away.\nHer silent purr I envisioned as we held one another.\nI knew my soft words could win away the stone of one who was\nflesh.\nI have seen the roses open its bud to show its dress of petals.\nThe strong scent and feeling of love that I urn for I wish to know\nit’s sweet taste again.\nI wish to know you the repairer of what is broken.\nWe will become as one wed cord.\nA part of the whole.\nI knew that one day the sun would dry up all the rain.\nAs the rain was my tears, and the tears tore as silent razor blades.\nRipping at my fleshy self-tearing me away where was I to go.\nTheir is no where to hide from ones self.\nEven in self-mutilation and malediction the cure is only temporary.\nWhat you have done to yourself may never heal with out the proper\ncure.\nThe essence of love is its ability to heal.\nTo drown the sorrows of the love lorn heart.\nTo be the sun to the rain.\nTo wash away the pain.\nI know this my love.","pages":[6],"words":226,"originalWords":229,"mood":"white flame / tender truth","say":"Love’s Salve. Before I saw her I knew she was the one. I had kissed those lips before. I have never touched her flesh. Yet I knew her soft caress. And to this dying day I didn’t want to throw it all away. Her silent purr I envisioned as we held one another. I knew my soft words could win away the stone of one who was flesh. I have seen the roses open its bud to show its dress of petals. The strong scent and feeling of love that I yearn for I wish to know its sweet taste again. I wish to know you the repairer of what is broken. We will become as one wed cord. A part of the whole. I knew that one day the sun would dry up all the rain. As the rain was my tears, and the tears tore as silent razor blades. Ripping at my fleshy self-tearing me away where was I to go. Their is nowhere to hide from ones self. Even in self-mutilation and malediction the cure is only temporary. What you have done to yourself may never heal without the proper cure. The essence of love is its ability to heal. To drown the sorrows of the lovelorn heart. To be the sun to the rain. To wash away the pain. I know this my love."},{"n":8,"id":"p008-friends","title":"Friends","originalTitle":"Friends","text":"How beautiful those we admire so dear, how powerful their word.\nWe learn from our friends. We try to accept them whatever they\nare. Their love comes to us, so that we may heal. They make us\nlaugh when we are down. Their smiles as bright as the sun. O boy\nwe need our friends.","original":"How beautiful those we admire so dear, how powerful their word.\nWe learn from our friends. We try to accept them what ever they\nare. There love comes to us, so that we may heal. They make us\nlaugh when we are down. There smiles as bright as the sun. O boy\nwe need our friends.","pages":[7],"words":55,"originalWords":56,"mood":"white flame / tender truth","say":"Friends. How beautiful those we admire so dear, how powerful their word. We learn from our friends. We try to accept them whatever they are. Their love comes to us, so that we may heal. They make us laugh when we are down. Their smiles as bright as the sun. O boy we need our friends."},{"n":9,"id":"p009-the-thing-they-call-god","title":"The Thing They Call God","originalTitle":"The thing they call god.","text":"A light comes burning through the window.\nWaking me in a startling way. You see this light was not an ordinary light at all.\nThe light could speak.\nIt would only speak in a tongue in which is as beautiful as the\ndivinity’s","original":"A light comes burning through the window.\nWaking me in a startling way. You see this light was not an ordi-\nnary light at all.\nThe light could speak.\nIt would only speak in a tongue in which is as beautiful as the\ndivinity’s","pages":[7],"words":43,"originalWords":44,"mood":"silver hope / living glare","say":"The Thing They Call God. A light comes burning through the window. Waking me in a startling way. You see this light was not an ordinary light at all. The light could speak. It would only speak in a tongue in which is as beautiful as the divinity’s"},{"n":10,"id":"p010-prophecy-of-greatness","title":"Prophecy of Greatness","originalTitle":"Prophecy of Greatness","text":"Understand the coming prophecy with the prophet. Burn to cinders\nthis world he says.\nThe world came flood in 2 forms feel what has been, and will be.\nThe sorceries came with their blackness, and light. Come forth creator so many can come again. We lost knowledge let us not, play\nthat serenade again. Use not what you have to dabble in what will\nretract what is known. Come not to me for I will come to you with\nmany treasures. Listen to what can be heard before you cannot.\nFollow the children to the cave where there can be no harm. Then\nyou will not burn to cinders or suffer the elements. Feel the light,\nand come forth with this wisdom, and harm no more. Come with\nyour mind, and body to the kingdom of enlightenment. Understand\nthe turmoil your energy is being put through. Make it through, and\nyou will find your rewards. Do you understand the greatness of\nwhat you have brought to yourself, and others?\nHear my words the prophet.","original":"Understand the coming prophecy with the prophet. Burn to cinders\nthis world he says.\nThe world came flood in 2 forms feel what has been, and will be.\nThe sorceries came with it’s blackness, and light. Come forth cre-\nator so many can come again. We lost knowledge let us not, play\nthat serenade again. Use not what you have to dabble in what will\nretract what is known. Come not to me for I will come to you with\nmany treasures. Listen to what can be heard before you cannot.\nFollow the children to the cave where there can be no harm. Then\nyou will not burn to cinders or suffer the elements. Feel the light,\nand come forth with this wisdom, and harm no more. Come with\nyour mind, and body to the kingdom of enlightenment. Un  Planned movement every step.\nIt’s all so detailed, see. Cannot live without a plan. Survival in its\npurest form. The things you do to get ahead are comprised of evil\ndeeds. Do you understand yourself enough to stand up against these\npowers? I hope you understand that these things you could have\nstopped. But there is this thing inside you that tells you not to stop.\nWhy must it be so difficult to stay within your own control? Who\nreally is your puppet-master the one who pulls your strings? Is this\npower so mad that it wishes to bring you to your knees in peril? Is\nhe the one who whims, you to blow in the wind? Are you as strong\nas they think you are or are you a week infidel?\nAre you the one who sings that whimsical rhyme from long ago, or\nis it him playing his music box. You try to fight your greatest\ndesires, but you can’t stop the evil speaking within your ear. Are\nyou the only one who feels this way in a world so large? I doubt\nyou know what you feel. All the people in all the worlds, Are they\ndriven by a puppet master? Is the puppet master driven? Why don’t\nyou visit the world I live in the world of the puppet kingdoms, a\nplace where fairies and trolls are real? Where dreams do come true.\nWell, we are in a darker world where nightmares are the only truth.\nPeople who fear this world should step through the door. The door\nwhere fears burn and dreams live and have their own personalities.\nUnderstand these powers, know their strengths and weaknesses and\none day you will become a puppet king. With a crown made of\nwood and a castle made of grass.","original":"A fire burning in his eye, temptation just so great, a mind that’s\nticking as if it where a metronome. Planned movement every step.\nIt’s all so detailed, see. Cannot live without a plan. Survival in its\npurest form. The things you do to get ahead are comprised of evil\ndeeds. Do you understand yourself enough to stand up against these\npowers? I hope you understand that these things yo ns to my inner beast. Hear it, it hides deep\ninside.\nA call to me from their souls tells me their secrets.\nFor they also have a dark side. Some call for this side to set itself\napart.\nThey know not the beast they tempt. One day their calls will be\nheard. Its furrowed brow will rise. The beast shall move furiously\nforward. In its ravenous strides, it shall control those who summon\nforth its fury and rage.\nAll who stand before the beast shall cower! The one who called the\nbeast will no longer be in control. Darkness: the indescribable\nwaves of blackness that pass over, that has passed before. Chills my\nvery existence. I do not know that which is dark. I am the dark. The\ncold morbid stone with dark eyes, and face. The impenetrable darkness seeps from my pores. It is unholy unknowable substance, is\nwhat constitutes my flesh and blood with its form. Stare too long,\nand you also shall be consumed. Neither fortitude nor endurance\nwill prevail or prevent your consumption.","original":"It swallows me, it is so close, and it is my indignation.\nYour false cries harkens to my inner beast. Hear it, it hides deep\ninside.\nA call to me from their souls tells me their secrets.\nFor they also have a dark side. Some call for this side to set itself\napart.\nThey know not the beast they tempt. One day their calls will be\nheard. Its furrowed brow will rise. The beast shall move furiously\nforward. In its ravenous strides, it shall control those who summon\nforth its fury and rage.\nAll who stand before the beast shall cower! The one who called the\nbeast will no longer be in control. Darkness: the indescribable\nwaves of blackness that pass over, that has passed before. Chills my\nvery existence. I do not know that which is dark. I am the dark. The\ncold morbid stone with dark eyes, and face. The impenetrable dark-\nness seeps from my pores. It is unholy unknowable substance, is\nwhat constitutes my flesh and blood with its form. Stare too long,\nand you also shall be consumed. Neither fortitude nor endurance\nwill prevail or prevent your consumption.","pages":[27],"words":192,"originalWords":193,"mood":"black weather / honest descent","say":"Darkness. It swallows me, it is so close, and it is my indignation. Your false cries harkens to my inner beast. Hear it, it hides deep inside. A call to me from their souls tells me their secrets. For they also have a dark side. Some call for this side to set itself apart. They know not the beast they tempt. One day their calls will be heard. Its furrowed brow will rise. The beast shall move furiously forward. In its ravenous strides, it shall control those who summon forth its fury and rage. All who stand before the beast shall cower! The one who called the beast will no longer be in control. Darkness: the indescribable waves of blackness that pass over, that has passed before. Chills my very existence. I do not know that which is dark. I am the dark. The cold morbid stone with dark eyes, and face. The impenetrable darkness seeps from my pores. It is unholy unknowable substance, is what constitutes my flesh and blood with its form. Stare too long, and you also shall be consumed. Neither fortitude nor endurance will prevail or prevent your consumption."},{"n":36,"id":"p036-dark-art","title":"Dark Art","originalTitle":"Dark art","text":"Here I am sitting dreaming lucidly. The shadows slowly crept across\nthe threshold. Screams were part of this night. Blood was used as a\ninstrument of art. The smell of sex was deep. Was this a part of a\ndeeply occult ritual? Why was it done in me how was the power\nreleased? Sickness: then it spread itself. Yet there was nothing","original":"Here I am sitting dreaming lucidly. The shadows slowly crept across\nthe threshold. Screams were part of this night. Blood was used as a\ninstrument of art. The smell of sex was deep. Was this a part of a\ndeeply occult ritual? Why was it done in me how was the power\nreleased? Sickness: then it spread itself. Yet the p. Yet they tell me I am out of luck.\nI have no rights. I am not free. I am sitting here I am 16.\nThey punish me so well. They took away my bill of rights. Now I\nam running.\nHere this night. There is no constitution to set me free. I know this\nthough I am only 16.","pages":[32],"words":67,"originalWords":67,"mood":"black weather / honest descent","say":"Loss of Independence. They wish to kill me string me up. Yet they tell me I am out of luck. I have no rights. I am not free. I am sitting here I am 16. They punish me so well. They took away my bill of rights. Now I am running. Here this night. There is no constitution to set me free. I know this though I am only 16."},{"n":45,"id":"p045-my-bars","title":"My Bars","originalTitle":"My bars","text":"Whirling sickly down trip. Bad apple son on burned. Hide him\naway, you’re judged. Yet none of them are suited. We are trying to\nstrengthen the bars, just to make a better web. Segregate because of\nyour self. Post mortem report rigimortis stricken. Hiding in a mausoleum.","original":"Whirling sickly down trip. Bad apple son on burned. Hide him\naway, you’re judged. Yet none of them are suited. We are trying to\nstrengthen the bars, just to make a better web. Segregate because of\nyour self. Post mortem report rigimortis stricken. Hiding in a mau-\nsoleum.","pages":[33],"words":47,"originalWords":48,"mood":"grey field / open nerve","say":"My Bars. Whirling sickly down trip. Bad apple son on burned. Hide him away, you’re judged. Yet none of them are suited. We are trying to strengthen the bars, just to make a better web. Segregate because of your self. Post mortem report rigimortis stricken. Hiding in a mausoleum."},{"n":46,"id":"p046-hard-treaded-path","title":"Hard Treaded Path","originalTitle":"Hard treaded path","text":"Here I am sitting writing staring. Who are they? Why they came?\nThey stare at me with their glazed-over eyes. How much of this can\none being take? You call me names yet you are ignorant of who I\nam, or what I am. Put on my mask, wear it for as long as I have,\nfeel it the way I have felt it. I think you would buckle. Surviving is\nso much harder. When you have so many forces against you. We all\nget stuck in traps; some will keep you forever. How to break infinity, that is the question I ask myself. How to keep from waking in\nthe morning. Knowing you are fighting for every second. If it’s not\nwith large problems or life threatening situations, it’s with the small\nnuances. Why bring a child in the world you know you cannot care\nfor? This child then becomes tossed wave to wave. With no guidance or love. Who is to care for him or her? No one to love or hold\nhim. No protection from the ever-potent storm; living, and for\nwhat? Out of the lust of two, brought from the loins of the mother.\nNever to be cared for again. Her love not for her children but for\neverything that can allow escape. Why,why,why? To escape would\ncost me so dear. Never to get caught in traps. To pull out may be\nimpossible. So never get caught is the answer. My life, your life,\nthey do not compare. Feelings can only be felt by one. Try not to\ntrust try not to feel. To be without emotions would be a blessing.\nThis is asking too much, though. Losing a childhood does strange\nthings to people. To live a loved life is all the people of the world\nask for. There would be no prosperity problems. The people of the\nworld would rejoice. Darker endings for a darker world.","original":"Here I am sitting writing staring. Who are they? Why they came?\nThey stare at me with their glazed-over eyes. How much of this can\none being take? You call me names yet you are ignorant of who I\nam, or what I am. Put on my mask, wear it for as long as I have,\nfeel it the way I have felt it. I think you would buckle. Surviving is\nso much harder. When you have so many forces against you. We all\nget stuck in traps; some will keep you forever. How to break infini-\nty, that is the question I ask myself. How re for? This child then becomes tossed wave to wave. With no guidance or love. Who is to care for him or her? No one to love or hold him. No protection from the ever-potent storm; living, and for what? Out of the lust of two, brought from the loins of the mother. Never to be cared for again. Her love not for her children but for everything that can allow escape. Why,why,why? To escape would cost me so dear. Never to get caught in traps. To pull out may be impossible. So never get caught is the answer. My life, your life, they do not compare. Feelings can only be felt by one. Try not to trust try not to feel. To be without emotions would be a blessing. This is asking too much, though. Losing a childhood does strange things to people. To live a loved life is all the people of the world ask for. There would be no prosperity problems. The people of the world would rejoice. Darker endings for a darker world."},{"n":47,"id":"p047-left-behind","title":"Left Behind","originalTitle":"Left Behind","text":"Do you feel the wind to your back? Why do you hear the silence?\nIt’s all unraveling behind us. I feel I’ve left the land of the living.\nFeel this never never land. Now you’ve forgotten all I’ve taught\nyou. What means more to you your friends or this new way? Never\nneeded to understand this truth. Walking in a mist of faith. Do you\nlive your new life just mocking your old? Do you hate what is old?\nTry to become what you cannot. Why are you fighting what you\ncan’t? Trying to learn secrets that are forgotten. Never understood\nthis truth. What was then is not forgotten. Now you hear the truth\nfrom me. What was now is anew. Come with me, you blackened\ndog. Stop the madness in your heart. Lost myself must, reclaim it.\nTry to understand this truth.","original":"Do you feel the wind to your back? Why do you hear the silence?\nIt’s all unraveling behind us. I feel I’ve left the land of the living.\nFeel this never never land. Now you’ve forgotten all I’ve taught\nyou. What "n":49,"id":"p049-formations-changing","title":"Formations Changing","originalTitle":"Formations changing","text":"The wheel is turning. Splinters fly as the wheel whirls. They transform in the sight of many.\nThese changing forms take on a life of their own as dancing shadows on the wall. Silhouettes\nOf humanity in its lowest forms. These dank demons of my mind,\ntake on these laughing screaming forms.\nThe piles of splinters on the floor are the remains of many. The\nspecters of time slowly rise from the splinters. To join the wheel to\nset as an icon on this great monolith. It sets upon this golden\npedestal. The sounds of the wheel spinning drive most men’s minds\ninsane and who is the creature spinning this great contraption. It is\nthe creator being. His name is the great recycler, and this is what he\ndoes. He teaches all those who worship him and his wheel to do the\nsame, or destroy all that was created.","original":"The wheel is turning. Splinters fly as the wheel whirls. They trans-\nform in the sight of many.\nThese changing forms take on a life of there own as dancing shad-\nows on the wall. Silhouettes\nOf humanity in its lowest forms. These dank demons of my mind,\ntake on these laughing screaming forms.\nThe piles of splinters on the floor are the remains of many. The\nspecters of time slowly rise from the splinters. To join the wheel to\nset as an icon on this great monolith. It sets upon this golden\npedestal. The sounds of the wheel spinning drive most men’s minds\ninsane and who is the creature spinning this great contraption. It is\nthe creator being. His name is the great recycler, and this is what he\ndoes. He teaches all those who worship him and his wheel to do the\nsame, or destroy all that was created.","pages":[35],"words":149,"originalWords":151,"mood":"black weather / honest descent","say":"Formations Changing. The wheel is turning. Splinters fly as the wheel whirls. They transform in the sight of many. These changing forms take on a life of their own as dancing shadows on the wall. Silhouettes Of humanity in its lowest forms. These dank demons of my mind, take on these laughing screaming forms. The piles of splinters on the floor are the remains of many. The specters of time slowly rise from the splinters. To join the wheel to set as an icon on this great monolith. It sets upon this golden pedestal. The sounds of the wheel spinning drive most men’s minds insane and who is the creature spinning this great contraption. It is the creator being. His name is the great recycler, and this is what he does. He teaches all those who worship him and his wheel to do the same, or destroy all that was created."},{"n":50,"id":"p050-extinction","title":"Extinction!","originalTitle":"Extinction!","text":"Nowhere to run.\nNowhere to hide.\nWhen the bombs come a dropping like tears from the sky.\nWho’s the man deciding our fate. I’d like to say none but I know\nthere are many.\nLife is not worth living if there’s not a challenge. Lifelike a brutal\nwar composed of the worst.\nWe will not die for we are illusions holders. Extinction to come\nExtinction forever\nIn the darkness in the night sow them, reap, and take their heart.\nNow it’s stolen now its gone.\nIt is yours to abuse. Yet you are lost in this ineffable sunrise. It\nwon’t be abused I won’t take that you can’t break that. I will not be\nlost to you. I am free with broken wings.\nYet I will find a way to soar.\nWhy do you try to defile those who art dead. Has sickness spread\nthroughout your mind? There is pandemonium there I taste it.","original":"Nowhere to run.\nNowhere to hide.\nWhen the bombs come a dropping like tears from the sky.\nWho’s the man deciding our fate. I’d like to say none but I know\nthere are many.\nLife is not worth living if there’s not a challenge. Life like a brutal\nwar composed of the worst.\nWe will not die for we are illusions holders. Extinction to come\nExtinction forever\nIn the darkness in the night sow them, reap, and take their heart.\nNow it’s stolen now its gone.\nIt is yours to abuse. Yet you are lost in this ineffable sunrise. It\nwon’t be abused I won’t take that you can’t break that. I will not be\nlost to you. I am free with broken wings.\nYet I will find a way to soar.\nWhy do you try to defile those who art dead. Has sickness spread\nthroughout your mind? There is pandemonium there I taste it.","pages":[36],"words":154,"originalWords":155,"mood":"white flame / tender truth","say":"Extinction!. Nowhere to run. Nowhere to hide. When the bombs come a dropping like tears from the sky. Who’s the man deciding our fate. I’d like to say none but I know there are many. Life is not worth living if there’s not a challenge. Lifelike a brutal war composed of the worst. We will not die for we are illusions holders. Extinction to come Extinction forever In the darkness in the night sow them, reap, and take their heart. Now it’s stolen now its gone. It is yours to abuse. Yet you are lost in this ineffable sunrise. It won’t be abused I won’t take that you can’t break that. I will not be lost to you. I am free with broken wings. Yet I will find a way to soar. Why do you try to defile those who art dead. Has sickness spread throughout your mind? There is pandemonium there I taste it."},{"n":51,"id":"p051-m-a-d-time","title":"M.A.D Time","originalTitle":"M.A.D Time","text":"As the sun fell from the sky, your skin is blown off then your bones\nturn to dust.\nEverything around becomes incinerated. The earth becomes molten\nform. It melts again within an atomic furnace.","original":"As the sun fell from the sky, your skin is blown off then your bones\nturn to dust.\nEverything around becomes incinerated. The earth becomes molten\nform. It melts again within an atomic furnace.","pages":[37],"words":34,"originalWords":34,"mood":"silver hope / living glare","say":"M.A.D Time. As the sun fell from the sky, your skin is blown off then your bones turn to dust. Everything around becomes incinerated. The earth becomes molten form. It melts again within an atomic furnace."},{"n":52,"id":"p052-prophecy-b52-spiritual-warfare","title":"Prophecy B52 Spiritual Warfare","originalTitle":"Prophecy B52 Spiritual Warfare","text":"I see airfields in the distance scorched earth. Fires still burning.\nThese are not all physical. People hold malice in their hearts. Stars\nstripes are not forever as they are held on posts in tears.\nIsrael screams contrition. Dark hymns spoken in board offices. A\nglobal prison keeps me at bay. When there is no freedom I will be\nmost free.","original":"I see airfields in the distance scorched earth. Fires still burning.\nThese are not all physical. People hold malice in their hearts. Stars\nstripes are not forever as they are held on posts in tears.\nIsrael screams contrition. Dark hymns spoken in board offices. A\nglobal prison keeps me at bay. When there is no freedom I will be\nmost free.","pages":[37],"words":61,"originalWords":61,"mood":"white flame / tender truth","say":"Prophecy B52 Spiritual Warfare. I see airfields in the distance scorched earth. Fires still burning. These are not all physical. People hold malice in their hearts. Stars stripes are not forever as they are held on posts in tears. Israel screams contrition. Dark hymns spoken in board offices. A global prison keeps me at bay. When there is no freedom I will be most free."},{"n":53,"id":"p053-the-coming-of-disaster","title":"The Coming of Disaster","originalTitle":"The coming of disaster","text":"Futuristic fantasy fixation.\nFounded by the founder.\nDreaming of the dreamer.\nDrowning in dreams.\nPulling out the pauper.\nPissing on bastions.\nSaying harsh words.\nKnowing that these words would sting.\nStuck on stupid are the people and the pulling.\nClarity is coming.\nDomination dedicated to downfall.\nFiltered mass of ooze.\nBlackness.","original":"Futuristic fantasy fixation.\nFounded by the founder.\nDreaming of the dreamer.\nDrowning in dreams.\nPulling out the pauper.\n ntroller. Maybe I am having\na nightmare that is lasting forever. Dreams not worth dreaming.\nDeath not worth dying. Immortality incarnate since you do not wish\nto live.\nFighting a battle you’ll never win.\nInfinity","original":"I’m\ngone\nleft this\nplace a\nlong\ntime\nago.\nClock spinning forward but I am turning back. No stopping a per-\nson just running wild. They are losing what was, piece by piece.\nFighting a battle when you know there is no victor.\nDying to know if there are any plans behind this insanity.\nThere is no control where there is no controller. Maybe I am having\na nightmare that is lasting forever. Dreams not worth dreaming.\nDeath not worth dying. Immortality incarnate since you do not wish\nto live.\nFighting a battle you’ll never win.\nInfinity","pages":[40],"words":96,"originalWords":97,"mood":"black weather / honest descent","say":"Never-Ending Insanity. I’m gone left this place a long time ago. Clock spinning forward but I am turning back. No stopping a person just running wild. They are losing what was, piece by piece. Fighting a battle when you know there is no victor. Dying to know if there are any plans behind this insanity. There is no control where there is no controller. Maybe I am having a nightmare that is lasting forever. Dreams not worth dreaming. Death not worth dying. Immortality incarnate since you do not wish to live. Fighting a battle you’ll never win. Infinity"},{"n":61,"id":"p061-forever","title":"Forever","originalTitle":"Forever","text":"","original":"","pages":[40],"words":0,"originalWords":0,"mood":"grey field / open nerve","say":"Forever."},{"n":62,"id":"p062-flashes-of-glory","title":"Flashes of Glory","originalTitle":"Flashes of glory","text":"Why must I die in a sudden flash of glory?\nMy heart stops, I drop to my knees, I die in a flash of glory.\nThe spirits come, hunting me down like the animal I once was.\nThey find me, Come with me, your work is done.” They take me\nto be judged.\nThey tell me I am not accepted in either world. I am alone once\nagain.","original":"Why must I die in a sudden flash of glory?\nMy heart stops, I drop to my knees, I die in a flash of glory.\nThe spirits come, hunting me down like the animal I once was.\nThey find me, Come with me, your work is done.” They take me\nto be judged.\nThey tell me I am not accepted in either world. I am alone once\nagain.","pages":[41],"words":68,"originalWords":68,"mood":"white flame / tender truth","say":"Flashes of Glory. Why must I die in a sudden flash of glory? My heart stops, I drop to my knees, I die in a flash of glory. The spirits come, hunting me down like the animal I once was. They find me, Come with me, your work is done.” They take me to be judged. They tell me I am not accepted in either world. I am alone once again."},{"n":63,"id":"p063-pissed-off-poem","title":"Pissed-Off Poem","originalTitle":"Pissed Off Poem","text":"Insanity hates to love all that want to be. I hate most for I feel no\nreason to like.\nWhat is love? I don’t know. When I meet death I will leave. Never\nto set my foot upon the ground again. Yet my spirit shall build a\nwealth unknown to man’s eyes. Total recall; see what you’ve lost.\nYou’ll see you were fooled. Once again you’re lost. I’m coming; I\nchange the way you think. Your body and mind are weak. Seek the\ntruth. It will be hard. Your journey will last lifetimes. Have you\nbeen here before? Do you know? When you fight against the system, you’re fighting for change. Do you know what is going to\nchange? Is it better this way or that? Savoir what is change - the\nillusion? Next in line: what’s your number?\nWe’ve died yet we live. Who’s to decide what is best for you? Do\nyou talk behind their backs? Speak up! Make them listen. I am\npissed I can take no more. I am a revolution!\nThey built me! Their madness tries to sink in. Pain is everywhere.\nSelf-destruction count down is happening. It is time to stop, and\nstart.","original":"Insanity hates to love all that want to be. I hate most for I feel no\nreason to like.\nWhat is love? I don’t know. When I meet death I will leave. Never\nto set my foot upon the ground again. Yet my spirit shall build a\nwealth unknown to man’s eyes. Total recall; see what you’ve lost.\nYou’ll see you were fooled. Once again you’re lost. I’m coming; I\nchange the way you think. Your body and mind are weak. Seek the\ntruth. It will be hard. Your journey will last lifetimes. Have you\nbeen here before? Do you know? When you fight against the sys-\ntem, you’re fighting for change. Do you know what is going to\nchange? Is it better this way or that? Savoir what is change - the\nillusion? Next in line: what’s your number?\nWe’ve died yet we live. Who’s to decide what is best for you? Do\nyou talk behind their backs? Speak up! Make them listen. I am\npissed I can take no more. I am a revolution!\nThey built me! Their madness tries to sink in. Pain is everywhere.\nSelf-destruction count down is happening. It is time to stop, and\nstart.","pages":[42],"words":199,"originalWords":200,"mood":"white flame / tender truth","say":"Pissed-Off Poem. Insanity hates to love all that want to be. I hate most for I feel no reason to like. What is love? I don’t know. When I meet death I will leave. Never to set my foot upon the ground again. Yet my spirit shall build a wealth unknown to man’s eyes. Total recall; see what you’ve lost. You’ll see you were fooled. Once again you’re lost. I’m coming; I change the way you think. Your body and mind are weak. Seek the truth. It will be hard. Your journey will last lifetimes. Have you been here before? Do you know? When you fight against the system, you’re fighting for change. Do you know what is going to change? Is it better this way or that? Savoir what is change - the illusion? Next in line: what’s your number? We’ve died yet we live. Who’s to decide what is best for you? Do you talk behind their backs? Speak up! Make them listen. I am pissed I can take no more. I am a revolution! They built me! Their madness tries to sink in. Pain is everywhere. Self-destruction count down is happening. It is time to stop, and start."},{"n":64,"id":"p064-manifest-destiny","title":"Manifest Destiny","originalTitle":"Manifest destiny","text":"A tear a pain that tears. Longing the want when it seems impossible\nto accomplish. Beyond comprehension you haven’t tried to understand it.\nKnow it all has no idea of how little he or she knows. Tomorrow an\nexcuse to waste today.","original":"A tear a pain that tears. Longing the want when it seems impossible\nto accomplish. Beyond comprehension you haven’t tried to under-\nstand it.\nKnow it all has no idea of how little he or she knows. Tomorrow an\nexcuse to waste today.","pages":[42],"words":42,"originalWords":43,"mood":"grey wound / violent honesty","say":"Manifest Destiny. A tear a pain that tears. Longing the want when it seems impossible to accomplish. Beyond comprehension you haven’t tried to understand it. Know it all has no idea of how little he or she knows. Tomorrow an excuse to waste today."},{"n":65,"id":"p065-floating-dreams","title":"Floating Dreams","originalTitle":"Floating Dreams","text":"My life’s in tremors of mass destruction.\nNow It’s time to pick up the pieces. Putting it back together like a\nshattered vase. Now to find the crazy glue. Slowly trembling as I\nplace the pieces. Which never seem to fit. Every piece a little closer\nto the final product. I don’t wish to see, or maybe there is more to\nsee and hear. Broken the heart that bled with tears of broken floating dreams.","original":"My life’s in tremors of mass destruction.\nNow It’s time to pick up the pieces. Putting it back together like a\nshattered vase. Now to find the crazy glue. Slowly trembling as I\nplace the pieces. Which never seem to fit. Every piece a little closer\nto the final product. I don’t wish to see, or maybe there is more to\nsee and hear. Broken the heart that bled with tears of broken float-\ning dreams.","pages":[43],"words":75,"originalWords":76,"mood":"white flame / tender truth","say":"Floating Dreams. My life’s in tremors of mass destruction. Now It’s time to pick up the pieces. Putting it back together like a shattered vase. Now to find the crazy glue. Slowly trembling as I place the pieces. Which never seem to fit. Every piece a little closer to the final product. I don’t wish to see, or maybe there is more to see and hear. Broken the heart that bled with tears of broken floating dreams."},{"n":66,"id":"p066-psychomachia","title":"Psychomachia","originalTitle":"Psychomachia","text":"To go through the same continual machinations. You are churned\nthrough horrid heavy wheels of same. Flesh is hanging limply from\nbody. Never questioning self. Answers come from self. Forget what\nyou know. Secrets lie in perception. Zombies who walk among me.\nI am vast wasteland filled with creativity. Hidden horrors lurk in\nhidden shadows waiting to steal from me the only thing I truly\nhave. Lost are those who travel in forests of bones. Only to gain\nthat which is insane. Faces come from walls of sordid pain to haunt\nmy shattered existence. For what is this life, I ask myself? To be\nchurned again I say.\nLost am I in a world I cannot return from.","original":"To go through the same continual machinations. You are churned\nthrough horrid heavy wheels of same. Flesh is hanging limply from\nbody. Never questioning self. Answers come from self. Forget what\nyou know. Secrets lie in perception. Zombies who walk among me.\nI am vast wasteland filled with creativity. Hidden horrors lurk in\nhidden shadows waiting to steal from me the only thing I truly\nhave. Lost are those who travel in forests of bones. Only to gain\nthat which is insane. Faces come from walls of sordid pain to haunt\nmy shattered existence. For what is this life, I ask myself? To be\nchurned again I say.\nLost am I in a world I cannot return from.","pages":[43],"words":118,"originalWords":118,"mood":"black weather / honest descent","say":"Psychomachia. To go through the same continual machinations. You are churned through horrid heavy wheels of same. Flesh is hanging limply from body. Never questioning self. Answers come from self. Forget what you know. Secrets lie in perception. Zombies who walk among me. I am vast wasteland filled with creativity. Hidden horrors lurk in hidden shadows waiting to steal from me the only thing I truly have. Lost are those who travel in forests of bones. Only to gain that which is insane. Faces come from walls of sordid pain to haunt my shattered existence. For what is this life, I ask myself? To be churned again I say. Lost am I in a world I cannot return from."},{"n":67,"id":"p067-the-things-we-are","title":"The Things We Are","originalTitle":"The things we are.","text":"Why must we be the things that we see? How to get by the\nwriting on the wall.\nThe feelings deep inside. A secret you cannot share to truly bier the\npain is to die. Were fighting with ourselves. There is no one else to\nfight. Lying like a corpse. Trying to escape our misery. The love we\ncannot bier. The secret we can’t share that’s hiding within us all.\nWhy it holds us behind walls we cannot pass. The fears that we cannot see. It’s a part of you, a part of me. It’s hidden deep inside the\nthings we are.","original":"Why must we be the things that we see? How to get by the\nwriting on the wall.\nThe feelings deep inside. A secret you cannot share to truly bier the\npain is to die. Were fighting with ourselves. There is no one else to\nfight. Lying like a corpse. Trying to escape our misery. The love we\ncannot bier. The secret we can’t share that’s hiding within us all.\nWhy it holds us behind walls we cannot pass. The fears that we can-\nnot see. It’s a part of you, a part of me. It’s hidden deep inside the\nthings we are.","pages":[44],"words":102,"originalWords":103,"mood":"white flame / tender truth","say":"The Things We Are. Why must we be the things that we see? How to get by the writing on the wall. The feelings deep inside. A secret you cannot share to truly bier the pain is to die. Were fighting with ourselves. There is no one else to fight. Lying like a corpse. Trying to escape our misery. The love we cannot bier. The secret we can’t share that’s hiding within us all. Why it holds us behind walls we cannot pass. The fears that we cannot see. It’s a part of you, a part of me. It’s hidden deep inside the things we are."},{"n":68,"id":"p068-symphony-of-sorrows","title":"Symphony of Sorrows","originalTitle":"Symphony of sorrows","text":"The unbegotten deceitful nature of this world.\nBrings forth an unfelt taint.\nSadness released in a premonition.\nI weep as the world weeps.\nThe whisper willows wail their song to unhearing ears.\nMy emotions madden me my emotions sadden me.\nThrough doors I do not see opening\nI try to reach for the sky gates.\nYet without-stretched arms I am never accepted.\nMy tears create raindrops that drench the earth.\nI wish my father heard my cries and would help to ease my pain.\nYet when I feel I reach out I feel we are worlds apart.\nYes I wished to help you I never thought it would bring this pain.\nMy silence and heart go out to you; I want to feel your breath.\nI want our shattered worlds to merge.\nTo lose this dirty pain.\nAccept me into your fold so that we can reign.\nKnow I call out to you every day’s desires.\nLove me, tell me I am your forgotten son, the one you love so dear.\nI know you from so far away though I always know you’re there.\nI love you father, more than you could know.\nPlease take your last begotten son to the heaven I know so well.\nI want not the ignorance of this earth.\nIf you need me here I will stay.\nAlthough it saddens me to do so when you are so far away.\nI love you for I know that we are one.","original":"The unbegotten deceitful nature of this world.\nBrings forth an unfelt taint.\nSadness released in a premonition.\nI weep as the world weeps.\nThe whisper willows wail their song to unhearing ears.\nMy emotions madden me my emotions sadden me.\nThrough doors I do not see opening\nI try to reach for the sky gates.\nYet with out-stretched arms I am never accepted.\nMy tears create raindrops that drench the earth.\nI wish my father heard my cries and would help to ease my pain.\nYet when I feel I reach out I feel we are worlds apart.\nYes I wished to help you I never thought it would bring this pain.\nMy silence and heart go out to you; I want to feel your breath.\nI want our shattered worlds to merge.\nTo lose this dirty pain.\nAccept me into your fold so that we can reign.\nKnow I call out to you every day’s desires.\nLove me, tell me I am your forgotten son, the one you love so dear.\nI know you from so far away though I always know you’re there.\nI love you father, more than you could know.\nPlease take your last begotten son to the heaven I know so well.\nI want not the ignorance of this earth.\nIf you need me here I will stay.\nAlthough it saddens me to do so when you are so far away.\nI love you for I know that we are one.","pages":[45],"words":245,"originalWords":246,"mood":"white flame / tender truth","say":"Symphony of Sorrows. The unbegotten deceitful nature of this world. Brings forth an unfelt taint. Sadness released in a premonition. I weep as the world weeps. The whisper willows wail their song to unhearing ears. My emotions madden me my emotions sadden me. Through doors I do not see opening I try to reach for the sky gates. Yet without-stretched arms I am never accepted. My tears create raindrops that drench the earth. I wish my father heard my cries and would help to ease my pain. Yet when I feel I reach out I feel we are worlds apart. Yes I wished to help you I never thought it would bring this pain. My silence and heart go out to you; I want to feel your breath. I want our shattered worlds to merge. To lose this dirty pain. Accept me into your fold so that we can reign. Know I call out to you every day’s desires. Love me, tell me I am your forgotten son, the one you love so dear. I know you from so far away though I always know you’re there. I love you father, more than you could know. Please take your last begotten son to the heaven I know so well. I want not the ignorance of this earth. If you need me here I will stay. Although it saddens me to do so when you are so far away. I love you for I know that we are one."},{"n":69,"id":"p069-soul-soup","title":"Soul Soup","originalTitle":"Soul Soup","text":"My eyes open wide.\nThen I die.\nRest in peace close my eyes.\nLive to die.\nPerfect the past.\nLive again.\nReborn.\nReturn.\nTrying to make me succumb, trying to beat me into submission.\nWill fail soldier of time.\nNever die.\nCan you take me?\nWho will break me?\nIn my eyes.\nRepeat\nWho are you to destroy me?\nComing back repeat the beat.\nBreaking bones tearing souls.\nNext in line.\nNext to die.\nReverse\nTime to break you.\nTime to steal your life.\nAll your money give me your wife give me your life.\nTake all that I can.\nGoing to break you.\nWorst of all, got your soul.","original":"My eyes open wide.\nThen I die.\nRest in peace close my eyes.\nLive to die.\nPerfect the past.\nLive again.\nReborn.\nReturn.\nTrying to make me succumb, trying to beat me into submission.\nWill fail soldier of time.\nNever die.\nCan you take me?\nWho will break me?\nIn my eyes.\nRepeat\nWho are you to destroy me?\nComing back repeat the beat.\nBreaking bones tearing souls.\nNext in line.\nNext to die.\nReverse\nTime to break you.\nTime to steal your life.\nAll your money give me your wife give me your life.\nTake all that I can.\nGoing to break you.\nWorst of all, got your soul.","pages":[46],"words":110,"originalWords":110,"mood":"grey field / open nerve","say":"Soul Soup. My eyes open wide. Then I die. Rest in peace close my eyes. Live to die. Perfect the past. Live again. Reborn. Return. Trying to make me succumb, trying to beat me into submission. Will fail soldier of time. Never die. Can you take me? Who will break me? In my eyes. Repeat Who are you to destroy me? Coming back repeat the beat. Breaking bones tearing souls. Next in line. Next to die. Reverse Time to break you. Time to steal your life. All your money give me your wife give me your life. Take all that I can. Going to break you. Worst of all, got your soul."},{"n":70,"id":"p070-passing-the-blame","title":"Passing the Blame","originalTitle":"Passing the blame","text":"The lies that have been passed. The pain that has been felt from\nexperiences. It’s all pushed away or to another. It’s time to stop\npassing the blame, and take responsibility.\nEverything that you just push off or leave unresolved. Will push\nback twice as hard. Start closing up the gaps. Allowing yourself to\nget caught in a tangle of problems others have created for you. It is\neasy to resolve by taking control of the problems; they will then no\nlonger have control. Your stress relived you release a long awaited\ngasp.","original":"The lies that have been passed. The pain that has been felt from\nexperiences. It’s all pushed away or to another. It’s time to stop\npassing the blame, and take responsibility.\nEverything that you just push off or leave unresolved. Will push\nback twice as hard. Start closing up the gaps. Allowing yourself to\nget caught in a tangle of problems others have created for you. It is\neasy to resolve by taking control of the problems; they will then no\nlonger have control. Your stress relived you release a long awaited\ngasp.","pages":[47],"words":93,"originalWords":93,"mood":"grey wound / violent honesty","say":"Passing the Blame. The lies that have been passed. The pain that has been felt from experiences. It’s all pushed away or to another. It’s time to stop passing the blame, and take responsibility. Everything that you just push off or leave unresolved. Will push back twice as hard. Start closing up the gaps. Allowing yourself to get caught in a tangle of problems others have created for you. It is easy to resolve by taking control of the problems; they will then no longer have control. Your stress relived you release a long awaited gasp."},{"n":71,"id":"p071-silhouette-of-shadow","title":"Silhouette of Shadow","originalTitle":"Silhouette of shadow","text":"Impoverished the dog that stands before me. Is he naught a man?\nHe is bestial I see it within his ka. He is a dark beast. These powers\nwelcome him. In his desperation he strikes out only to find that it\nwas nothing he struck.\nO darkness the silent embrace. Night black pictures hanging. On red\nwalls. Yes this is a house of man. See his face.","original":"Impoverished the dog that stands before me. Is he naught a man?\nHe is bestial I see it within his ka. He is a dark beast. These powers\nwelcome him. In his desperation he strikes out only to find that it\nwas nothing he struck.\nO darkness the silent embrace. Night black pictures hanging. On red\nwalls. Yes this is a house of man. See his face.","pages":[47],"words":67,"originalWords":67,"mood":"black weather / honest descent","say":"Silhouette of Shadow. Impoverished the dog that stands before me. Is he naught a man? He is bestial I see it within his ka. He is a dark beast. These powers welcome him. In his desperation he strikes out only to find that it was nothing he struck. O darkness the silent embrace. Night black pictures hanging. On red walls. Yes this is a house of man. See his face."},{"n":72,"id":"p072-shards-of-me","title":"Shards of Me","originalTitle":"Shards of me","text":"All emotions all hurt regression of all things. I’ve lived in a world\nof hurt, pain. Obstacles are easy emotions are not. No emotion is\neasy to bring forth. All the insanity in the world does not equal all\nthis pain. Insanity stems from pain that cannot be dealt with, or\nscrewed-up genetics. The beast inside wants to be full circle. I need\nhelp, I need help, I need help. Reaching out yet I can find no hand.\nShall I fall? I am hanging hrough time. Why choose to help.\nWhy care, seems too traumatic.","pages":[48],"words":234,"originalWords":235,"mood":"black weather / honest descent","say":"Shards of Me. All emotions all hurt regression of all things. I’ve lived in a world of hurt, pain. Obstacles are easy emotions are not. No emotion is easy to bring forth. All the insanity in the world does not equal all this pain. Insanity stems from pain that cannot be dealt with, or screwed-up genetics. The beast inside wants to be full circle. I need help, I need help, I need help. Reaching out yet I can find no hand. Shall I fall? I am hanging from a weak branch from a tall tree. My life seems to fade away as a dream. Abused in always. My mind is bruised no one can see the inner hurt. I broken battered hurting don’t leave. I say to the wind. The wind does not hear me when I call. The writings on the wall are of pain, and hurt written in blood bones, and guts. I dodge all pain. This fatigues me. I drop I’m killed by the stones, thrown from so long ago. New emotion shadow. Then bring out what has been kept so deep so unwanted. My fear keeps me from the transmutation. Beautiful energy trapped in corpse. Only let out at death. Death wish, Serial killer, going but can’t for need. Losing control. Emotions make. Why live why die. Purgatories pain no more. Travel through time. Why choose to help. Why care, seems too traumatic."},{"n":73,"id":"p073-the-light-the-dark","title":"The Light & the Dark","originalTitle":"The Light & The Dark","text":"I understand the life that you live. Your life is a terrible thing to\nwaste. Control your temptation and you’ll have lost yourself. Your\nmind’s in turmoil; what to do? Why are you wasting away for\nsomething that is doing nothing for you? Can’t you feel that something is wrong? Why do you not feel the way you did?\nHelp yourself before it is too late. Why do you like this pain?\nDying from the inside out. I can tell you’re not the same. Why do\nyou try to hide this from me? w you."},{"n":77,"id":"p077-dove-s-sacrifice","title":"Dove’s Sacrifice","originalTitle":"Doves sacrifice","text":"Short small gasps fill my sanctum.\nBlack crushed velvet adorning warm bodies.\nStaring at stars.\nLinear crystalline structures, filled with liquid love.\nGlorious pink plasmic fluid.\nEctoplasm, aether, the void, astral, I travel through with silver cord\nintact.\nNeither right hand nor left hand path, not the middle, beginning,\nnor end.\nCampdon Downs and sacred places.\nLong forgotten sacrifice takes place; apparition of the past.\nWonderful strobe lights, washing over me.\nSeparation of selves.\nLast episode.","original":"Short small gasps fill my sanctum.\nBlack crushed velvet adorning warm bodies.\nStaring at stars.\nLinear crystalline structures, filled with liquid love.\nGlorious pink plasmic fluid.\nEctoplasm, aether, the void, astral, I travel through with silver cord\nintact.\nNeither right hand nor left hand path, not the middle, beginning,\nnor end.\nCampdon Downs and sacred places.\nLong forgotten sacrifice takes place; apparition of the past.\nWonderful strobe lights, washing over me.\nSeparation of selves.\nLast episode.","pages":[52],"words":76,"originalWords":76,"mood":"white flame / tender truth","say":"Dove’s Sacrifice. Short small gasps fill my sanctum. Black crushed velvet adorning warm bodies. Staring at stars. Linear crystalline structures, filled with liquid love. Glorious pink plasmic fluid. Ectoplasm, aether, the void, astral, I travel through with silver cord intact. Neither right hand nor left hand path, not the middle, beginning, nor end. Campdon Downs and sacred places. Long forgotten sacrifice takes place; apparition of the past. Wonderful strobe lights, washing over me. Separation of selves. Last episode."},{"n":78,"id":"p078-dancing-in-the-darkness","title":"Dancing in the Darkness","originalTitle":"Dancing in the darkness","text":"A knife blade shines from a glint of moonlight. There are blood\nspecks on the hardly discernable man who is dressed in deep blackness. With a flick of the wrist the blood is cleaned from the grooves\nof the knife. It dances to a sonnet. There lies a body of a woman\ndressed in shades of jade. He moves softly. Leaving no trace except\nfor the incision made to the breast of the woman.","original":"A knife blade shines from a glint of moonlight. There are blood\nspecks on the hardly discernable man who is dressed in deep black-\nness. With a flick of the wrist the blood is cleaned from the grooves\nof the knife. It dances to a sonnet. There lies a body of a woman\ndressed in shades of jade. He moves softly. Leaving no trace except\nfor the incision made to the breast of the woman.","pages":[53],"words":74,"originalWords":75,"mood":"black weather / honest descent","say":"Dancing in the Darkness. A knife blade shines from a glint of moonlight. There are blood specks on the hardly discernable man who is dressed in deep blackness. With a flick of the wrist the blood is cleaned from the grooves of the knife. It dances to a sonnet. There lies a body of a woman dressed in shades of jade. He moves softly. Leaving no trace except for the incision made to the breast of the woman."},{"n":79,"id":"p079-living-or-dead","title":"Living or Dead","originalTitle":"Living or Dead","text":"He walks down the street with a limp. He moans, and groans drool\ndribbles down his chin. The black skinned people get on their knees\nand pray to their mother goddess. His eyes are glassy. His skin\nseems to droop off of his body. The people scream and shout yet he\nseems to hear nothing. He turns to a dark alley mindlessly. He pulls\na glistening key from his pocket. The key is carefully placed in the\nhole.\nThe body gently slides down the wall. Towards the concrete. He hits\nthe ground with a thud.\nNow tell me the answer to this question.\nIs this man? Well is he living or dead?","original":"He walks down the street with a limp. He moans, and groans drool\ndribbles down his chin. The black skinned people get on their knees\nand pray to their mother goddess. His eyes are glassy. His skin\nseems to droop off of his body. The people scream and shout yet he\nseems to hear nothing. He turns to a dark alley mindlessly. He pulls\na glistening key from his pocket. The key is carefully placed in the\nhole.\nThe body gently slides down the wall. Towards the concrete. He hits\nthe ground with a thud.\nNow tell me the answer to this question.\nIs this man? Well is he living or dead?","pages":[53],"words":112,"originalWords":112,"mood":"black weather / honest descent","say":"Living or Dead. He walks down the street with a limp. He moans, and groans drool dribbles down his chin. The black skinned people get on their knees and pray to their mother goddess. His eyes are glassy. His skin seems to droop off of his body. The people scream and shout yet he seems to hear nothing. He turns to a dark alley mindlessly. He pulls a glistening key from his pocket. The key is carefully placed in the hole. The body gently slides down the wall. Towards the concrete. He hits the ground with a thud. Now tell me the answer to this question. Is this man? Well is he living or dead?"},{"n":80,"id":"p080-loki-fire-trickster","title":"Loki (Fire, Trickster)","originalTitle":"Loki (Fire, Trickster)","text":"From leaving the fire you’re within walk forward. So you can\nrelease yourself. So you can keep old fires burning bright. You will\nknow when your fire building has ended.\nFor this will be your end.","original":"From leaving the fire you’re within walk forward. So you can\nrelease yourself. So you can keep old fires burning bright. You will\nknow when your fire building has ended.\nFor this will be your end.","pages":[53],"words":36,"originalWords":36,"mood":"grey wound / violent honesty","say":"Loki (Fire, Trickster). From leaving the fire you’re within walk forward. So you can release yourself. So you can keep old fires burning bright. You will know when your fire building h  am forever! Sing to me about the truth yet so\nmany lies are spread when ones heart is open. Are they malignant\nhow can you tell? They sing something of destruction yet implausibility you believe it is your fault. Although you are omnipotent it\ndoes not quite matter there is heresy in the works. The blood brings\nme closer. The breath makes me stronger. Intellect perplexes those\nlandmarks that stand among men yet they are men. I feel the dance\nabove me I feel the wind below me, yet darkness shines clearer.\nWhen you see past illusions. You see illumination this is the truth.\n“Can you hear the one handed clap.”","original":"Dread fear intrepid step am I backward or forward on this swing.\nThey come for me they scream for me. They want me. I do not want\nthem yet deaths dark tendrils crawling closer. Force of light you\nshan’t stop me. I am forever! Sing to me about the truth yet so\nmany lies are spread when ones heart is open. Are they malignant\nhow can you tell? They sing something of destruction yet implausi-\nbility you believe it is your fault. Although you are omnipotent it\ndoes not quite matter there is heresy in the works. The blood brings\nme closer. The breath makes me stronger. Intellect perplexes those\nlandmarks that stand among men yet they are men. I feel the dance\nabove me I feel the wind below me, yet darkness shines clearer.\nWhen you see past illusions. You see illumination this is the truth.\n“Can you hear the one handed clap.”","pages":[54],"words":153,"originalWords":154,"mood":"white flame / tender truth","say":"Spector. Dread fear intrepid step am I backward or forward on this swing. They come for me they scream for me. They want me. I do not want them yet deaths dark tendrils crawling closer. Force of light you shan’t stop me. I am forever! Sing to me about the truth yet so many lies are spread when ones heart is open. Are they malignant how can you tell? They sing something of destruction yet implausibility you believe it is your fa hat\nhurt fades. Then it comes back. Slowly I try not to love. Then emotions die. Then they come back. It’s like an eternity of pain till the\none you love knows it. Then the pressures really on. Choices then\nflood her head. Many answers. None acceptable. She lies crying in\nher bed thoughts. Come flooding her like oceans currents. People ask\nher why she cries. The thoughts hurt to bad I have many new decisions. With no answers. Now you too hurt. The answers hurt either\nway.","original":"As I sit in my bed thoughts spin round my head. Many questions but\nno answers. A lot of hurt little joy. No thoughts hurt more than one. I\ndon’t know what to do. Like a child exploring new wilderness. I’m\nexploring new emotions. The newest one to me is true love. This is\nthe one that hurts the most. I think I’ve found it but I cannot grasp it.\nFor the one I love is right in front of my face, but I cannot grasp her.\nFor I’m different can’t you see? Hurt is with you, and me. Slowly that\nhurt fades. Then it comes back. Slowly I try not to love. Then emo-\ntions die. Then they come back. It’s like an eternity of pain till the\none you love knows it. Then the pressures really on. Choices then\nflood her head. Many answers. None acceptable. She lies crying in\nher bed thoughts. Come flooding her like oceans currents. People ask\nher why she cries. The thoughts hurt to bad I have many new deci-\nsions. With no answers. Now you too hurt. The answers hurt either\nway.","pages":[61],"words":188,"originalWords":190,"mood":"white flame / tender truth","say":"Thoughts. As I sit in my bed thoughts spin round my head. Many questions but no answers. A lot of hurt little joy. No thoughts hurt more than one. I don’t know what to do. Like a child exploring new wilderness. I’m exploring new emotions. The newest one to me is true love. This is the one that hurts the most. I think I’ve found it but I cannot grasp it. For the one I love is right in front of my face, but I cannot grasp her. For I ed by projectiles at high velocity. Vampirism occurring to your quantum self. Demented those not understanding the preliminaries."},{"n":165,"id":"p165-spoiled-confection","title":"Spoiled Confection","originalTitle":"Spoiled Confection","text":"My desires, papers false confectionary wonders.\nSmell drift light winds pass.\nI receive poetry and candies from many.\nMany are not wanted.\nFew are well received if you had the choice of many one would still be your favorite.","original":"My desires, papers false confectionary wonders.\nSmell drift light winds pass.\nI receive poetry and candies from many.\nMany are not wanted.\nFew are well received if you had the choice of many one would still be your favorite.","pages":[88],"words":39,"originalWords":39,"mood":"silver hope / living glare","say":"Spoiled Confection. My desires, papers false confectionary wonders. Smell drift light winds pass. I receive poetry and candies from many. Many are not wanted. Few are well received if you had the choice of many one would still be your favorite."},{"n":166,"id":"p166-temperature-evasion-molecule","title":"Temperature Evasion Molecule","originalTitle":"Temperature evasion molecule","text":"Idiosyncrasies hidden within ideograms.\nFilled with chi.\nChilled in a Kelvin coolant of liquid hydrogen.","original":"Idiosyncrasies hidden within ideograms.\nFilled with chi.\nChilled in a Kelvin coolant of liquid hydrogen.","pages":[88],"words":15,"originalWords":15,"mood":"grey field / open nerve","say":"Temperature Evasion Molecule. Idiosyncrasies hidden within ideograms. Filled with chi. Chilled in a Kelvin coolant of liquid hydrogen."},{"n":167,"id":"p167-the-meaningless-people","title":"The Meaningless People","originalTitle":"The meaningless people","text":"When you die, mothers cry, are forgotten.\nAs time passes no one left to remember.\nEndless days and night’s equinox, and the shadow of the moon.\nFull moon lunar eclipse.\nTranscending..\nHuman abortion worthless fetus.\nAs you all once where.\nChicanery perusing antiques as they slip in the deep pockets of a grand black leather trench.\nTrench mouth fools espousing obligations envied.","original":"When you die, mothers cry, are forgotten.\nAs time passes no one left to remember.\nEndless days and night’s equinox, and the shadow of the moon.\nFull moon lunar eclipse.\nTranscending..\nHuman abortion worthless fetus.\nAs you all once where.\nChicanery perusing antiques as they slip in the deep pockets of a grand black leather trench.\nTrench mouth fools espousing obligations envied.","pages":[89],"words":62,"originalWords":62,"mood":"black weather / honest descent","say":"The Meaningless People. When you die, mothers cry, are forgotten. As time passes no one left to remember. Endless days and night’s equinox, and the shadow of the moon. Full moon lunar eclipse. Transcending.. Human abortion worthless fetus. As you all once where. Chicanery perusing antiques as they slip in the deep pockets of a grand black leather trench. Trench mouth fools espousing obligations envied."},{"n":168,"id":"p168-to-divide-to-frenzy","title":"To Divide to Frenzy","originalTitle":"To divide to frenzy.","text":"How often are the secret dreams, what refugee.\nOur desires our consumption.\nAgitated by immorality knowing the false spelling.\nHolding a mighty glare what consequence.\nAre most in the vast schemes without the support of the populous no matter how brilliant, how positive it will matter not.\nTribal scrawling on Ares rock a place I have not yet seen with these living eyes.\nI care not I dream about elucidating in meditation how vast we can be.\nCondemn me to the social environment, and the pithy design.\nIt matters not the time period we exist within the results are quite predictable as a coin flip.\nThere may be variations in the coin flipped yet essentially the results are the same.\nWhen people are involved, some form of tomfoolery will occur.","original":"How often our the secret dreams, what refugee.\nO nce upon a time, I saw a dreamin time.\nThrice struck lightning.\nThe sky illuminated by crackling electrons with pulsating polarities not just another nimrod, in was an\nincalculable probability.\nThe child of evolution sitting in trust.\nSome equalization must occur.\nthere is a triad that exists in threes.\nPower exists in threes.","pages":[90],"words":53,"originalWords":53,"mood":"silver hope / living glare","say":"Triad. Once upon a time, I saw a dreamin time. Thrice struck lightning. The sky illuminated by crackling electrons with pulsating polarities, not just another nimrod; it was an incalculable probability. The child of evolution sitting in trust. Some equalization must occur. There is a triad that exists in threes. Power exists in threes."},{"n":170,"id":"p170-void-sensation","title":"Void Sensation","originalTitle":"Void Sensation","text":"No motion, up, no motion down, no motion, speeding, no acceleration.\nFixated nothing questioning worthless.\nFeeling desire.\nRandom splatter pitter patter.\nFootsies falling flitter flatter.\nDark tangent dangling coil.\nClasp clouded clutter.","original":"No motion, up, no motion down, no motion, speeding, no acceleration.\nFixated nothing questioning worthless.\nFeeling desire.\nRandom splatter pitter patter.\nFootsies falling flitter flatter.\nDark tangent dangling coil.\nClasp clouded clutter.","pages":[90],"words":32,"originalWords":32,"mood":"black weather / honest descent","say":"Void Sensation. No motion, up, no motion down, no motion, speeding, no acceleration. Fixated nothing questioning worthless. Feeling desire. Random splatter pitter patter. Footsies falling flitter flatter. Dark tangent dangling coil. Clasp clouded clutter."},{"n":171,"id":"p171-witchcraft","title":"Witchcraft","originalTitle":"Witchcraft","text":"In the heart of darkness.\nIn the heart of night.\nYou may have met me there.\nThe wind runs through me.\nStanding in front of the moon.\nSpeaking in dead tongues.\nPulling the coins from the f compiling and fighting.\nI bring you this work; it shares a part of ourselves that I think many have forgotten ever happened.\nI know that in all people are these dreams that are still hiding in the dark that they thought they\nkilled.\nKeep dreaming.","original":"Working Girls are not soulless whores served for your concession.\nThere little girls with tons of heart with concrete walls you see.\nThey hide there fragility from the jacks of the world, the ones that do them harm.\nI do surmise by the look in her eyes that she cries her lonely eyes, because the kindness\nshe Seeks is not between some sheets.\nAfter years of compiling and fighting.\nI bring you this work it shares a part of ourselve that I think many have forgotten has ever hap-\npened.\nI know that in all people are these dreams that are still hiding in the dark that they thought they\nkilled.\nKeep dreaming.","pages":[91,92],"words":111,"originalWords":113,"mood":"white flame / tender truth","say":"Working Girls. Working Girls are not soulless whores served for your concession. They’re little girls with tons of heart with concrete walls you see. They hide their fragility from the jacks of the world, the ones that do them harm. I do surmise by the look in her eyes that she cries her lonely eyes, because the kindness she seeks is not between some sheets. After years of compiling and fighting. I bring you this work; it shares a part of ourselves that I think many have forgotten ever happened. I know that in all people are these dreams that are still hiding in the dark that they thought they killed. Keep dreaming.","gold":true},{"n":173,"id":"p173-thanks","kind":"colophon","title":"Thanks","originalTitle":"Thanks","text":"http://www.livejournal.com/users/luminosity","original":"http://www.livejournal.com/users/luminosity","pages":[92],"words":1,"originalWords":1,"mood":"benediction / keep dreaming","say":"Thanks.","gold":true}]</script>

function makeOrnament(p){
